server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve built assets directly; fall back to index.html so client-side
    # (react-router) routes resolve instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed build assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
